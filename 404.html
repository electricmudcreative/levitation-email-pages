<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    :root { --bg: #000; --ink: #fff; --accent: #40D1B4; --muted: #888; --font: "Space Mono", monospace; --font-heading: "Jost", sans-serif; }

    p { color: var(--muted); font-size: 15px; margin-bottom: 32px; }
    a { color: var(--accent); text-decoration: none; border: 2px solid var(--accent); padding: 10px 28px; font-family: var(--font-heading); font-size: 14px; font-weight: 500; letter-spacing: .04em; text-transform: uppercase; }
    a:hover { background: var(--accent); color: #000; }

</head>
