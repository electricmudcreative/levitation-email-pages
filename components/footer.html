    body { background: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
    .footer { background: #000; border-top: 1px solid rgba(255,255,255,0.1); }
    .footer__inner { max-width: 1200px; margin: 0 auto; padding: 32px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
    .footer__brand { display: flex; align-items: center; gap: 24px; }
    .footer__brand img { height: 22px; width: auto; opacity: 0.7; }
    .footer__brand span { color: rgba(255,255,255,0.4); font-size: 12px; letter-spacing: 0.04em; }
    .footer__nav { display: flex; gap: 20px; align-items: center; }
    .footer__nav a { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; transition: color 0.2s; }
    .footer__nav a:hover { color: #fff; }
    .footer__social { display: flex; gap: 16px; align-items: center; }
    .footer__social a { color: rgba(255,255,255,0.5); text-decoration: none; transition: color 0.2s; display: flex; }
    .footer__social a:hover { color: #fff; }
    @media (max-width: 600px) {
      .footer__inner { flex-direction: column; align-items: center; text-align: center; gap: 20px; }
      .footer__brand { flex-direction: column; gap: 8px; }
      .footer__nav { gap: 14px; flex-wrap: wrap; justify-content: center; }
    }
