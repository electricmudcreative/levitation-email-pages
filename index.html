<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Join LEVITATION</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000; --ink: #FFFFFF; --muted: #888888;
            --rule: rgba(255,255,255,.14); --card: #111111; --accent: #40D1B4;
            --secondary: #bc3562;
            --success: #2e7d32; --success-bg: rgba(46,125,50,.15);
            --error: #c62828; --error-bg: rgba(198,40,40,.15);
            --radius: 0px; --pill: 0px;
            --font: "Space Mono", monospace;
            --font-heading: "Jost", sans-serif;
            --shadow: 0 1px 3px rgba(0,0,0,.3); --shadow-hover: 0 4px 12px rgba(0,0,0,.4);
            --transition: 0.2s cubic-bezier(.4,0,.2,1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font); background: var(--bg); color: var(--ink);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 24px;
        }
        .container {
            background: var(--card); border: 1px solid var(--rule); border-radius: var(--radius);
            box-shadow: var(--shadow-hover); max-width: 480px; width: 100%;
            padding: 48px 40px; text-align: center;
        }
        .logo { font-family: var(--font-heading); font-size: 28px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
        .logo span { color: var(--accent); }
        .subtitle { color: var(--muted); font-size: 15px; margin-bottom: 32px; line-height: 1.5; }
        .form-group { margin-bottom: 16px; text-align: left; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--ink); }
        .form-group input {
            width: 100%; padding: 12px 16px; border: 1px solid var(--rule);
            border-radius: 0px; font-size: 15px; font-family: var(--font);
            background: var(--bg); color: var(--ink); transition: border var(--transition);
        }
        .form-group input::placeholder { color: var(--muted); }
        .form-group input:focus { outline: none; border-color: var(--accent); }
        .btn {
            width: 100%; padding: 14px; border: 2px solid var(--ink); border-radius: 0px;
            background: transparent; color: var(--ink); font-size: 16px; font-weight: 700;
            font-family: var(--font-heading); cursor: pointer; transition: all var(--transition);
            margin-top: 8px; letter-spacing: .02em;
        }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .btn:disabled { opacity: .5; cursor: not-allowed; }
        .toast {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
            padding: 14px 28px; border-radius: 0px; font-size: 14px; font-weight: 600;
            opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100;
        }
        .toast.success { background: var(--success-bg); color: var(--success); border: 1px solid var(--success); }
        .toast.error { background: var(--error-bg); color: var(--error); border: 1px solid var(--error); }
        .toast.show { opacity: 1; }
        .links { margin-top: 24px; font-size: 13px; color: var(--muted); }
        .links a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .links a:hover { text-decoration: underline; }
        .divider { width: 40px; height: 3px; background: var(--accent); border-radius: 0px; margin: 0 auto 24px; }
    </style>
</head>
<body>
    <div id="toast" class="toast"></div>
    <div class="container">
        <div class="logo">LEVIT<span>A</span>TION</div>
        <div class="divider"></div>
        <p class="subtitle">Psychedelic rock and beyond. Get lineup announcements, ticket presales, merch drops, and set times delivered to your inbox.</p>
        <form id="subscribe-form" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required />
            </div>
            <div class="form-group">
                <label for="first_name">First name</label>
                <input type="text" id="first_name" name="first_name" placeholder="Your first name" />
            </div>
            <button type="submit" class="btn" id="submit-btn">Join LEVITATION</button>
        </form>
        <div class="links">
            <p>Already subscribed? <a href="/preferences/" id="link-prefs">Manage preferences</a></p>
        </div>
    </div>

    <script async src="https://static.klaviyo.com/onsite/js/klaviyo.js?company_id=XP2nn6"></script>
    <script>
        var _learnq = window._learnq || [];

        function eLink(base) {
            var email = getEmail();
            return email ? base + '?e=' + encodeURIComponent(email) : base;
        }

        // Pre-fill email if arriving from a Klaviyo link
        document.addEventListener('DOMContentLoaded', function() {
            var email = getEmail();
            if (email) document.getElementById('email').value = email;
            var prefsLink = document.getElementById('link-prefs');
            if (prefsLink) prefsLink.href = eLink(prefsLink.getAttribute('href'));
        });

        function getEmail() {
            var params = new URLSearchParams(window.location.search);
            var g = params.get('g');
            if (g) {
                try {
                    var raw = atob(g);
                    try { var obj = JSON.parse(raw); if (obj && (obj.email || obj['$email'])) return obj.email || obj['$email']; } catch(e) {}
                    if (raw.indexOf('@') !== -1) return raw.trim();
                } catch(e) {}
            }
            return params.get('e') || params.get('email') || '';
        }

        function handleSubmit(e) {
            e.preventDefault();
            var email = document.getElementById('email').value.trim();
            var firstName = document.getElementById('first_name').value.trim();

            if (!email) { showToast('Please enter your email address.', 'error'); return; }

            var btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = 'Joining...';

            // Subscribe via Klaviyo client API
            fetch('https://a.klaviyo.com/client/subscriptions/?company_id=XP2nn6', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'revision': '2024-10-15' },
                body: JSON.stringify({
                    data: {
                        type: 'subscription',
                        attributes: {
                            profile: {
                                data: {
                                    type: 'profile',
                                    attributes: {
                                        email: email,
                                        first_name: firstName || undefined,
                                        properties: { subscribe_source: 'levitation_email_hub' }
                                    }
                                }
                            },
                            custom_source: 'Email Hub'
                        },
                        relationships: {
                            list: { data: { type: 'list', id: 'QRWuvZ' } }
                        }
                    }
                })
            })
            .then(function(r) {
                // Also identify via _learnq
                var _learnq = window._learnq || [];
                var identifyData = { '$email': email };
                if (firstName) identifyData['$first_name'] = firstName;
                _learnq.push(['identify', identifyData]);
                _learnq.push(['track', 'Subscribed via Email Hub', { source: 'levitation_email_hub' }]);

                document.getElementById('subscribe-form').innerHTML = '<p style="font-size:18px;font-weight:700;color:var(--accent);padding:24px 0;">Welcome to LEVITATION!<br><span style="font-size:14px;color:var(--muted);font-weight:400;display:block;margin-top:8px;">Check your inbox. Set your preferences below.</span></p><a href="/preferences/?e=' + encodeURIComponent(email) + '" style="display:block;margin-top:16px;padding:12px 24px;border:2px solid var(--accent);color:var(--accent);text-decoration:none;font-family:var(--font-heading);font-size:14px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;">Set Preferences &rarr;</a>';
            })
            .catch(function() {
                showToast('Something went wrong. Please try again.', 'error');
                btn.disabled = false;
                btn.textContent = 'Join LEVITATION';
            });
        }

        function showToast(msg, type) {
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type + ' show';
            setTimeout(function(){ t.classList.remove('show'); }, 4000);
        }
    </script>
</body>
</html>
